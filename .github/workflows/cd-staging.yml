name: Deploy Frontend to Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag DockerHub (ex: staging-v1.2.3)"
        required: true

jobs:
  deploy:
    name: Deploy Frontend → OVH VPS (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging VPS
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << EOF
          set -e
          cd /home/deploy/tea-app-web-staging || exit 1

          echo "Mise a jour du code..."
          git fetch origin
          git reset --hard origin/staging

          echo "Generation du .env..."
          cat > .env << 'ENVEOF'
          IMAGE_TAG=${IMAGE_TAG}
          ENVEOF

          echo "Pull image : zstin4/tea-web:${IMAGE_TAG}"
          docker pull zstin4/tea-web:${IMAGE_TAG}

          echo "Demarrage du container..."
          IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.staging.yml up -d --remove-orphans --force-recreate

          timeout 30 bash -c 'until docker ps | grep -q tea_web_staging; do sleep 2; done' \
            || (echo "Container React staging non demarre" && exit 1)

          docker image prune -f
          echo "Frontend staging deploye : zstin4/tea-web:${IMAGE_TAG}"
          EOF

      - name: Resume
        run: |
          echo "## Staging frontend deploye" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.event.inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
