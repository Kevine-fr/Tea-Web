name: 🚀 Deploy Frontend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend → OVH VPS (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/tea-app-web || exit 1

            echo "📦 Pull du code..."
            git pull origin main

            echo "📝 Génération du .env..."
            cat > .env << 'EOF'
            VITE_API_URL=https://api-tea-main.wk-archi-o22a-15m-g1.fr
            VITE_SITE_URL=https://staging.wk-archi-o22a-15m-g1.fr
            EOF

            echo "🐳 Build et démarrage..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "🔍 Vérification..."
            timeout 30 bash -c 'until docker ps | grep -q tea_web; do sleep 2; done' \
              || (echo "❌ Container React non démarré" && exit 1)

            echo "🧹 Nettoyage images..."
            docker image prune -f

            echo "✅ Frontend prod déployé !"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Déploiement frontend prod échoué — vérifiez les logs."