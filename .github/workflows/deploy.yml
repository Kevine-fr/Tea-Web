name: 🚀 Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend → OVH VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    ${{ secrets.VPS_USER }}
          key:         ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs:        ENV_FILE
          script: |
            echo "──────────────────────────────────────────"
            echo "  📦  Pull du code FRONTEND"
            echo "──────────────────────────────────────────"
            cd /home/deploy/tea-app-web || exit 1
            git pull origin main

            echo "──────────────────────────────────────────"
            echo "  📝  Génération du .env (build React)"
            echo "──────────────────────────────────────────"
            printf '%s' "$ENV_FILE" > .env

            echo "──────────────────────────────────────────"
            echo "  🐳  Restart container React"
            echo "──────────────────────────────────────────"
            docker compose -f docker-compose.front.prod.yml down
            docker compose -f docker-compose.front.prod.yml up -d --build

            echo "──────────────────────────────────────────"
            echo "  ⏳  Attente démarrage (10s)"
            echo "──────────────────────────────────────────"
            sleep 10

            echo "──────────────────────────────────────────"
            echo "  🔍  Vérification container"
            echo "──────────────────────────────────────────"
            docker ps | grep tea_web || (echo "❌ Container React non démarré" && exit 1)

            echo "──────────────────────────────────────────"
            echo "  🧹  Nettoyage images Docker"
            echo "──────────────────────────────────────────"
            docker image prune -f

            echo ""
            echo "✅  Frontend déployé avec succès !"
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Le déploiement frontend a échoué — vérifiez les logs."