name: Deploy Frontend to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag DockerHub (ex: prod-v1.2.3)"
        required: true

jobs:
  deploy:
    name: Deploy Frontend → OVH VPS (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production VPS
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << EOF
          set -e
          cd /home/deploy/tea-app-web || exit 1

          echo "Mise a jour du code..."
          git fetch origin
          git reset --hard origin/main

          echo "Generation du .env..."
          cat > .env << 'ENVEOF'
IMAGE_TAG=${IMAGE_TAG}
ENVEOF

          echo "Pull image : zstin4/tea-web:${IMAGE_TAG}"
          docker pull zstin4/tea-web:${IMAGE_TAG}

          echo "Demarrage du container..."
          IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate

          timeout 30 bash -c 'until docker ps | grep -q tea_web; do sleep 2; done' \
            || (echo "Container React non demarre" && exit 1)

          docker image prune -f
          echo "Frontend prod deploye : zstin4/tea-web:${IMAGE_TAG}"
          EOF

      - name: Resume
        run: |
          echo "## Production frontend deployee" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.event.inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY