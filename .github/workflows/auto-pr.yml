name: Auto PR

on:
  status:

jobs:
  create-pr:
    name: Créer PR automatique
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    # Filtre : uniquement si Jenkins CI a réussi
    if: >-
      github.event.state == 'success' &&
      github.event.context == 'continuous-integration/jenkins/branch'

    steps:
      - uses: actions/checkout@v4

      # Extraire le nom de la branche depuis le payload de l'événement status
      # (github.event.branches est un tableau JSON — on utilise jq pour le lire)
      - name: Détecter la branche
        id: detect
        run: |
          BRANCH=$(echo '${{ toJSON(github.event.branches) }}' \
            | jq -r '.[].name' \
            | grep -E '^(dev|staging)$' \
            | head -1 || echo "")
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Branche détectée : ${BRANCH}"

      - name: Créer PR dev → staging
        if: steps.detect.outputs.branch == 'dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --base staging \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} dev→staging déjà ouverte — ignorée."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "🔀 Merge dev → staging ($(date '+%Y-%m-%d %H:%M'))" \
              --body "## Déploiement automatique

          Cette PR a été créée automatiquement après un push sur \`dev\`.

          ### Checklist
          - [ ] Les tests CI sont passés ✅
          - [ ] Les changements ont été vérifiés en local
          - [ ] Prêt pour le staging

          > Merger cette PR déclenchera le déploiement sur **staging**."
                      echo "PR dev→staging créée."
                    fi

      - name: Créer PR staging → main
        if: steps.detect.outputs.branch == 'staging'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --base main \
            --head staging \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} staging→main déjà ouverte — ignorée."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "🚀 Release staging → production ($(date '+%Y-%m-%d %H:%M'))" \
              --body "## Release en productname: Auto PR

# push fonctionne depuis n'importe quelle branche (contrairement à status
# qui n'est déclenché que depuis la branche par défaut).
# On vérifie ensuite via l'API que Jenkins CI a bien réussi avant de créer la PR.
on:
  push:
    branches:
      - dev
      - staging

jobs:
  create-pr:
    name: Créer PR automatique
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Attendre que Jenkins CI poste son statut "success" (max 15 min)
      - name: Attendre Jenkins CI
        id: wait-ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "En attente du statut Jenkins pour le commit ${SHA}..."

          for i in $(seq 1 45); do
            STATE=$(gh api "repos/${REPO}/statuses/${SHA}" \
              --jq '[.[] | select(.context == "continuous-integration/jenkins/branch")] | first | .state // "pending"' \
              2>/dev/null || echo "pending")

            echo "Tentative $i/45 — statut Jenkins : ${STATE}"

            if [ "$STATE" = "success" ]; then
              echo "result=success" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
              echo "❌ Jenkins CI a échoué — pas de PR créée."
              echo "result=failure" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 20
          done

          echo "⏰ Timeout : Jenkins CI n'a pas répondu en 15 min."
          echo "result=timeout" >> $GITHUB_OUTPUT

      - name: Créer PR dev → staging
        if: |
          steps.wait-ci.outputs.result == 'success' &&
          github.ref_name == 'dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --base staging \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} dev→staging déjà ouverte — ignorée."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "🔀 Merge dev → staging ($(date '+%Y-%m-%d %H:%M'))" \
              --body "## Déploiement automatique

          Cette PR a été créée automatiquement après un push sur \`dev\`.

          ### Checklist
          - [ ] Les tests CI sont passés ✅
          - [ ] Les changements ont été vérifiés en local
          - [ ] Prêt pour le staging

          > Merger cette PR déclenchera le déploiement sur **staging**."
                      echo "✅ PR dev→staging créée."
                    fi

      - name: Créer PR staging → main
        if: |
          steps.wait-ci.outputs.result == 'success' &&
          github.ref_name == 'staging'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --base main \
            --head staging \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} staging→main déjà ouverte — ignorée."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "🚀 Release staging → production ($(date '+%Y-%m-%d %H:%M'))" \
              --body "## Release en production

          Cette PR a été créée automatiquement après un push sur \`staging\`.

          ### Checklist
          - [ ] Les tests CI sont passés sur staging ✅
          - [ ] Les tests fonctionnels validés ✅
          - [ ] Validation manuelle sur staging effectuée
          - [ ] Prêt pour la production 🚀

          > Merger cette PR déclenchera le déploiement sur **production**."
                      echo "✅ PR staging→main créée."
                    fiion

          Cette PR a été créée automatiquement après un push sur \`staging\`.

          ### Checklist
          - [ ] Les tests CI sont passés sur staging ✅
          - [ ] Les tests fonctionnels validés ✅
          - [ ] Validation manuelle sur staging effectuée
          - [ ] Prêt pour la production 🚀

          > Merger cette PR déclenchera le déploiement sur **production**."
                      echo "PR staging→main créée."
                    fi