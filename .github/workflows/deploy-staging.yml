name: Deploy Frontend to VPS

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          echo "📦 Déploiement FRONTEND..."

          cd /home/deploy/tea-app-web-staging || exit 1

          echo "🔄 Mise à jour du code..."
          git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}

          echo "⚙️ Génération .env (build-time)..."
          cat > .env << ENVEOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          ENVEOF

          echo "🧹 Nettoyage ancien build..."
          docker compose -f docker-compose.front.prod.yml down

          echo "🏗️ Build + lancement..."
          docker compose -f docker-compose.front.prod.yml up -d --build

          echo "🧽 Nettoyage images inutiles..."
          docker image prune -f

          echo ""
          echo "✅ Frontend déployé avec succès"
          EOF